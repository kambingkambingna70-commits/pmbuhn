# Port: Render injects PORT env var automatically
server.port=${PORT:9500}

# Database Configuration - MySQL
# CRITICAL: Use SPRING_DATASOURCE_URL directly from Railway (has proxy domain)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool - Optimized for Railway with unstable network
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.test-while-idle=true
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Disable Spring Mail auto-configuration (tidak pakai JavaMailSender lagi)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Email Configuration - Brevo REST API
# Set BREVO_API_KEY dan MAIL_USERNAME (verified sender email) di Railway Variables
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${MAIL_USERNAME:noreply@pmb-uhn.ac.id}
brevo.sender.name=PMB HKBP Nommensen

# Resend API (legacy, tidak dipakai lagi)
resend.api-key=${RESEND_API_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=1MB
app.upload.dir=uploads/

# Server Timeout Configuration
server.tomcat.connection-timeout=120000
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024

# Request Timeout (miliseconds)
spring.mvc.async.request-timeout=120000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# BRIVA Configuration
briva.api.key=${BRIVA_API_KEY:your-api-key}
briva.api.secret=${BRIVA_API_SECRET:your-api-secret}
briva.api.url=https://apibriva.bri.co.id/v2
briva.client.id=${BRIVA_CLIENT_ID:your-client-id}

# Application Configuration
app.name=PMB HKBP Nommensen
app.version=1.0.0
app.timezone=Asia/Jakarta
app.frontend.url=${FRONTEND_URL:http://localhost:9500}

# ===== STATIC FILES & UPLOADS CONFIGURATION =====
# classpath:/static/ works both local and production (inside JAR)
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

# Disable all caching untuk development
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.cache=false

# Thymeleaf Configuration
# classpath:/templates/ works both local and production (inside JAR)
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.check-template-location=true

# ===== DEVELOPMENT TOOLS =====
# devtools hanya aktif di lokal (otomatis disabled saat run dari JAR)
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Gemini AI Configuration (opsional - fitur generate soal AI)
gemini.api.key=${GEMINI_API_KEY:}

# ===== DEBUG LOGGING CONFIGURATION =====
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.com.uhn.pmb=DEBUG
