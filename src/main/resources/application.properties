# Port: Render injects PORT env var automatically
server.port=${PORT:9500}

# Database Configuration - MySQL
# freesqldatabase.com (free cloud DB) - Account: 1693785
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT:3306}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool (stable for Railway cloud)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Mail Configuration - Brevo (Sendinblue) SMTP
# Set MAIL_HOST, MAIL_PORT, MAIL_USERNAME, MAIL_PASSWORD as env vars in Render dashboard
# Local dev: keep defaults below (or create .env file)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Resend Email API (for Railway/cloud where SMTP is blocked)
# Set RESEND_API_KEY env var in Railway to enable
resend.api-key=${RESEND_API_KEY:}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.file-size-threshold=1MB
app.upload.dir=uploads/

# Server Timeout Configuration
server.tomcat.connection-timeout=120000
server.tomcat.threads.max=200
server.tomcat.accept-count=100
server.compression.enabled=true
server.compression.min-response-size=1024

# Request Timeout (miliseconds)
spring.mvc.async.request-timeout=120000

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# BRIVA Configuration
briva.api.key=${BRIVA_API_KEY:your-api-key}
briva.api.secret=${BRIVA_API_SECRET:your-api-secret}
briva.api.url=https://apibriva.bri.co.id/v2
briva.client.id=${BRIVA_CLIENT_ID:your-client-id}

# Application Configuration
app.name=PMB HKBP Nommensen
app.version=1.0.0
app.timezone=Asia/Jakarta
app.frontend.url=${FRONTEND_URL:http://localhost:9500}

# ===== STATIC FILES & UPLOADS CONFIGURATION =====
# Serve static files from classpath + uploads + dev live-reload path
spring.web.resources.static-locations=classpath:/static/,file:./uploads/,file:src/main/resources/static/

# Disable all caching untuk development
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.max-age=0
spring.web.resources.cache.cachecontrol.no-cache=true
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.chain.cache=false

# Thymeleaf Configuration - Disable cache
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=file:src/main/resources/templates/
spring.thymeleaf.check-template-location=false

# ===== DEVELOPMENT TOOLS =====
# Enable spring-boot-devtools restart
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}

# ===== DEBUG LOGGING CONFIGURATION =====
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestResponseBodyMethodProcessor=DEBUG
logging.level.com.uhn.pmb=DEBUG
